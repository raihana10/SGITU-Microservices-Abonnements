# ═══════════════════════════════════════════════════════════
#  SGITU — Service Utilisateur (G3) — Port 8083
# ═══════════════════════════════════════════════════════════

spring.application.name=user-service

# ── Serveur ──
server.port=8083
server.servlet.context-path=/api

# ── Base de données PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT (clé secrète partagée avec G10 — min 256 bits) ──
jwt.secret=SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!

# ── Clé interne (partagée avec G10 pour /users/internal/**) ──
internal.key=SGITU_INTERNAL_SECRET_KEY_CHANGE_ME

# ── Swagger / OpenAPI ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
